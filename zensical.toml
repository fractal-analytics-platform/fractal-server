[project]
site_name = "Fractal Server"
site_url = "https://fractal-analytics-platform.github.io/fractal-server/"
repo_url = "https://github.com/fractal-analytics-platform/fractal-server"
repo_name = "fractal-analytics-platform/fractal-server"
extra_css = ["extra.css"]

nav = [
    { "Home" = "index.md" },
    { "Install/deploy" = "install_and_deploy.md" },
    { "Configuration" = "configuration.md" },
    { "Changelog" = "changelog.md" },
    { "Contributing" = "development.md" },
    { "Integrations" = [
        "internals/integrations/index.md",
        "internals/integrations/runners.md",
        "internals/integrations/tasks.md",
    ]
    },
    { "Database" = "internals/database.md" },
    { "Logging" = "internals/logging.md" },
    { "Version upgrades" = [
        "internals/version_upgrades/index.md",
        "internals/version_upgrades/upgrade_2_16_6_to_2_17_0.md",
        "internals/version_upgrades/upgrade_1_2_5_to_1_3_0.md",
    ]
    },
]
# Missing: CLI reference
# Missing: Code reference

[project.theme]
language = "en"
features = [
    "announce.dismiss",
    "content.code.annotate",
    "content.code.copy",
    "content.tabs.link",
    "content.tooltips",
    "navigation.footer",
    "navigation.indexes",
    "navigation.instant",
    "navigation.instant.prefetch",
    "navigation.instant.progress",
    "navigation.path",
    "navigation.sections",
    "navigation.tabs",
    "navigation.tabs.sticky",
    "search.highlight",
    "toc.follow",
    "toc.integrate",
]

[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "material/brightness-auto"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "teal"
accent = "green"
toggle.icon = "material/weather-sunny"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "teal"
accent = "gren"
toggle.icon = "material/weather-night"
toggle.name = "Switch to system preference"


[project.plugins.search]

[project.plugins.section-index]

[project.plugins.autorefs]
resolve_closest=true


[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
inventories = [
    "https://docs.python.org/3/objects.inv",
    "https://docs.pydantic.dev/latest/objects.inv",
]

[project.plugins.mkdocstrings.handlers.python.options]
backlinks = "tree"
docstring_style = "google"
docstring_section_style = "spacy"
# filters = []
# merge_init_into_class = true
# parameter_headings = true
# separate_signature = true
# show_root_heading = true
allow_inspection = true
show_root_full_path = false
show_signature_annotations = false
show_source = true
show_symbol_type_heading = true
show_symbol_type_toc = true
signature_crossrefs = true
summary = true
unwrap_annotated = true
show_attribute_values = true
inherited_members = true
extensions= ["griffe_pydantic"]
paths=["fractal_server"]
