name: Benchmarks

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions: {}

jobs:

  benchmark_api:
    name: Benchmarks
    runs-on: ubuntu-24.04

    permissions:
      pull-requests: write  # For https://github.com/mshick/add-pr-comment
      contents: write # For https://github.com/stefanzweifel/git-auto-commit-action

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      with:
        # Needed for stefanzweifel/git-auto-commit-action, to push new commits to the repository

        persist-credentials: true  # Needed for committing on the benchmark-api branch

    - name: Start Postgres
      run: |
        sudo systemctl start postgresql.service
        sudo --login -u postgres psql -c "ALTER USER postgres WITH PASSWORD 'postgres';"
        sudo --login -u postgres createdb fractal_test

    - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
      with:
        python-version: "3.12"

    - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      with:
        version: "0.11.14"
        enable-cache: true

    - run: uv sync --frozen --group dev

    - name: Run Fractal with Gunicorn
      run: |
        export POSTGRES_DB=fractal_test
        export POSTGRES_PASSWORD=postgres
        export POSTGRES_USER=postgres
        export POSTGRES_HOST=localhost
        export JWT_SECRET_KEY="very_secret_key-very_secret_key-very_secret_key"
        export JWT_EXPIRE_SECONDS=84600
        export FRACTAL_DEFAULT_GROUP_NAME=All
        cd benchmarks/
        uv run --frozen fractalctl set-db
        uv run --frozen fractalctl init-db-data --resource default --profile default --admin-email admin@example.org --admin-pwd 1234 --admin-project-dir "$(pwd)/project-dir"
        uv run --frozen python populate_db/populate_db_script.py
        uv run --frozen sh serve.sh

    - name: Benchmark
      run: |
        cd benchmarks/
        uv run --frozen python api_bench.py

    - name: Print logs stderr
      run: cat benchmarks/fractal-server.err

    - name: Print logs stdout
      run: cat benchmarks/fractal-server.out

    - name: Add comment with preview
      uses: mshick/add-pr-comment@ffd016c7e151d97d69d21a843022fd4cd5b96fe5
      with:
        message-path: benchmarks/bench_diff.md

    - name: Commit to benchmark-api branch
      if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
      run: |
        git switch benchmark-api
        git add benchmarks/bench.html benchmarks/bench.json
        git commit -m "Update bench.html & bench.json" --no-verify
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
