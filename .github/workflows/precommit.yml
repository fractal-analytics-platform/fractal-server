name: precommit and ty

on:
  push:
    branches: ["main", 'ihb-develop']
  pull_request:
    branches: ["main", 'ihb-develop']

permissions: {}

jobs:
  precommit-and-ty:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
          cache: "pip"

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.14"
          enable-cache: true
      - run: uv sync --frozen

      # Pre-commit
      - run: uv add "pre-commit==4.6.0"
      - run: uv run pre-commit run --all-files --show-diff-on-failure --color=always

      # Experimental running of `ty`
      - run: uv add "ty==0.0.48"
      - run: uv run ty check ./fractal_server
        continue-on-error: true
