name: precommit and ty

on:
  push:
    branches: ["main", 'ihb-develop']
  pull_request:
    branches: ["main", 'ihb-develop']

permissions: {}

jobs:
  precommit-and-ty:
    runs-on: ubuntu-24.04
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          version: "0.11.14"
          enable-cache: true
          python-version: "3.12"

      - run: uv sync --frozen

      # Pre-commit
      - run: uv add "pre-commit==4.6.0"
      - run: uv run pre-commit run --all-files --show-diff-on-failure --color=always

      # Experimental running of `ty`
      - run: uv add "ty==0.0.48"
      - run: uv run ty check ./fractal_server
        continue-on-error: true
